# vim: ft=dosini
[Metadata]
Name=Matugen
Version=0.1
Author=shorin
Description=WallpaperColorSyncByMatugen
ScaleWithDPI=True

[InputPanel]
NormalColor={{colors.on_surface.default.hex}}
HighlightColor={{colors.on_primary.default.hex}}
HighlightBackgroundColor={{colors.primary_fixed_dim.default.hex}}
HighlightCandidateColor={{colors.on_primary.default.hex}}
EnableBlur=False
BlurMask=
FullWidthHighlight=False
PageButtonAlignment="Last Candidate"

[InputPanel/Background]
Color={{colors.surface_container.default.hex}}
BorderColor={{colors.outline.default.hex}}
BorderWidth=1

[InputPanel/Background/Margin]
Left=1
Right=1
Top=1
Bottom=1

[InputPanel/Highlight]
Color={{colors.primary_fixed_dim.default.hex}}

[InputPanel/Highlight/Margin]
Left=6
Right=6
Top=4
Bottom=4

[InputPanel/ContentMargin]
Left=4
Right=4
Top=3
Bottom=3

[InputPanel/TextMargin]
Left=8
Right=8
Top=5
Bottom=5

[Menu]
NormalColor={{colors.on_surface.default.hex}}
HighlightCandidateColor={{colors.on_primary.default.hex}}

[Menu/Background]
Image=
Color={{colors.surface_container.default.hex}}
BorderColor={{colors.outline.default.hex}}
BorderWidth=1
Overlay=
Gravity="Top Left"
OverlayOffsetX=0
OverlayOffsetY=0
HideOverlayIfOversize=False

[Menu/Background/Margin]
Left=1
Right=1
Top=1
Bottom=1

[Menu/Highlight]
Image=
Color={{colors.primary_fixed_dim.default.hex}}
BorderColor={{colors.outline.default.hex}}
BorderWidth=0
Overlay=
Gravity="Top Left"
OverlayOffsetX=0
OverlayOffsetY=0
HideOverlayIfOversize=False

[Menu/Highlight/Margin]
Left=6
Right=6
Top=4
Bottom=4

[Menu/Highlight/OverlayClipMargin]
Left=0
Right=0
Top=0
Bottom=0

[Menu/Separator]
Image=
Color={{colors.outline.default.hex}}
BorderColor=#ffffff00
BorderWidth=0
Overlay=
Gravity="Top Left"
OverlayOffsetX=0
OverlayOffsetY=0
HideOverlayIfOversize=False

[Menu/Separator/Margin]
Left=0
Right=0
Top=0
Bottom=0

[Menu/Separator/OverlayClipMargin]
Left=0
Right=0
Top=0
Bottom=0

[Menu/CheckBox]
Image=radio.png
Color=#ffffff
BorderColor=#ffffff00
BorderWidth=0
Overlay=
Gravity="Top Left"
OverlayOffsetX=0
OverlayOffsetY=0
HideOverlayIfOversize=False

[Menu/CheckBox/Margin]
Left=0
Right=0
Top=0
Bottom=0

[Menu/CheckBox/OverlayClipMargin]
Left=0
Right=0
Top=0
Bottom=0

[Menu/SubMenu]
Image=arrow.png
Color=#ffffff
BorderColor=#ffffff00
BorderWidth=0
Overlay=
Gravity="Top Left"
OverlayOffsetX=0
OverlayOffsetY=0
HideOverlayIfOversize=False

[Menu/SubMenu/Margin]
Left=0
Right=0
Top=0
Bottom=0

[Menu/SubMenu/OverlayClipMargin]
Left=0
Right=0
Top=0
Bottom=0

[Menu/ContentMargin]
Left=4
Right=4
Top=3
Bottom=3

[Menu/TextMargin]
Left=8
Right=8
Top=5
Bottom=5
